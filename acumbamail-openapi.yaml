  /getInactiveSubscribers/:
    post:
      tags: [Subscribers]
      summary: Get inactive subscribers within a date range
      description: >
        Returns subscribers who became inactive (bounced, complained, etc.) within the
        specified date range.

        When `full_info=0` (default), returns a minimal list of emails.
        When `full_info=1`, returns full details including reason code and date.
        Reason code 3 typically indicates a hard bounce.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - date_from
                    - date_to
                  properties:
                    date_from:
                      type: string
                      format: date
                      description: Start date in YYYY-MM-DD format
                      example: "2025-01-01"
                    date_to:
                      type: string
                      format: date
                      description: End date in YYYY-MM-DD format
                      example: "2025-12-31"
                    full_info:
                      type: integer
                      enum: [0, 1]
                      default: 0
                      description: >
                        Set to 1 to get full info (reason code and date) for each inactive subscriber
      responses:
        '200':
          description: >
            If full_info=0: array of single-element arrays with email.
            If full_info=1: array of full InactiveSubscriber objects.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/GetInactiveSubscribersSimpleResponse'
                  - $ref: '#/components/schemas/GetInactiveSubscribersFullResponse'
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded

  # ═══════════════════════════════════════════
  # CAMPAIGNS
  # ═══════════════════════════════════════════

  /createCampaign/:
    post:
      tags: [Campaigns]
      summary: Create and optionally schedule a campaign
      description: >
        Creates a new email campaign. The `content` field must contain the
        `*|UNSUBSCRIBE_URL|*` merge tag or the API will reject it.

        Use `date_send` to schedule the campaign for a future time. If omitted,
        the campaign is created in draft mode.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - name
                    - from_name
                    - from_email
                    - subject
                    - content
                    - lists
                  properties:
                    name:
                      type: string
                      description: Internal campaign name
                      example: "My Newsletter June 2024"
                    from_name:
                      type: string
                      example: "John Doe"
                    from_email:
                      type: string
                      format: email
                      example: "newsletter@example.com"
                    subject:
                      type: string
                      example: "June Newsletter"
                    content:
                      type: string
                      description: HTML content; must include *|UNSUBSCRIBE_URL|* tag
                      example: "<p>Hello!</p><a href=\"*|UNSUBSCRIBE_URL|*\">Unsubscribe</a>"
                    lists:
                      type: array
                      items:
                        type: integer
                      description: Array of list IDs to send to
                      example: [1138335]
                    date_send:
                      type: string
                      description: Scheduled send date/time in "YYYY-MM-DD HH:MM" format
                      example: "2024-06-01 09:00"
                    tracking_urls:
                      type: integer
                      enum: [0, 1]
                      description: Enable URL click tracking
                    complete_json:
                      type: integer
                      enum: [1]
                      description: Set to 1 for complete JSON response
                    https:
                      type: integer
                      enum: [1]
                      description: Force HTTPS for tracking links
                    tracking_domain:
                      type: string
                      description: Custom tracking domain
                      example: "track.example.com"
                    pre_header:
                      type: string
                      description: Email preview text shown in inbox
                      example: "Don't miss our latest offers!"
      responses:
        '201':
          description: Campaign ID
          content:
            application/json:
              schema:
                type: integer
                example: 9876543
        '400':
          description: Invalid request (e.g. missing unsubscribe tag)
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded

  /sendTemplateCampaign/:
    post:
      tags: [Campaigns]
      summary: Create a campaign from a template
      description: >
        Creates a new campaign using an existing template identified by `template_id`.
        Optionally schedule with `date_send`.
      x-rate-limit: "10 requests/minute"
      requestBody:
