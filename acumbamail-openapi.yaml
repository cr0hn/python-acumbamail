                      type: string
                      example: "John Doe"
                    from_email:
                      type: string
                      format: email
                      example: "newsletter@example.com"
                    subject:
                      type: string
                      example: "Newsletter June 2024"
                    template_id:
                      type: integer
                      example: 8974913
                    lists:
                      type: array
                      items:
                        type: integer
                      example: [1138335]
                    date_send:
                      type: string
                      description: Scheduled send date in "YYYY-MM-DD HH:MM" format
                      example: "2024-06-01 09:00"
                    https:
                      type: integer
                      enum: [1]
                      description: Force HTTPS for tracking links
      responses:
        '201':
          description: Campaign ID
          content:
            application/json:
              schema:
                type: integer
                example: 9876543
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
