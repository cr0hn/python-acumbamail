          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    opens:
                      type: integer
                    clicks:
                      type: integer
              example:
                "2025-01-01":
                  opens: 10
                  clicks: 3
        '401':
          description: Unauthorized
        '404':
          description: List not found
        '429':
          description: Rate limit exceeded

  # ═══════════════════════════════════════════
  # TEMPLATES
  # ═══════════════════════════════════════════

  /getTemplates/:
    post:
      tags: [Templates]
      summary: Get all templates
      description: Returns all available email templates for the account.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthFields'
      responses:
        '200':
          description: Array of template objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TemplateInfo'
              example:
                - available: false
                  id: 8974913
                  name: "Template_3294239_96"
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded

  /createTemplate/:
    post:
      tags: [Templates]
      summary: Create a new template
      description: >
        Creates a new HTML email template. The `html_content` must include the
        `*|UNSUBSCRIBE_URL|*` merge tag.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - template_name
                    - html_content
                    - subject
                  properties:
                    template_name:
                      type: string
                      example: "My Template"
                    html_content:
                      type: string
                      description: HTML content; must include *|UNSUBSCRIBE_URL|* tag
                      example: "<p>Hello!</p><a href=\"*|UNSUBSCRIBE_URL|*\">Unsubscribe</a>"
                    subject:
                      type: string
                      example: "Newsletter"
                    custom_category:
                      type: string
                      example: "Newsletter"
                    bee_json:
                      type: string
                      description: BEE editor JSON source for the template
                    id:
                      type: integer
                      description: Specific template ID to assign (optional)
      responses:
        '201':
          description: ID of the newly created template
          content:
            application/json:
              schema:
                type: integer
                example: 8974913
        '400':
          description: Invalid request (e.g. missing unsubscribe tag)
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded

  /duplicateTemplate/:
    post:
      tags: [Templates]
      summary: Duplicate an existing template
      description: Creates a copy of an existing template with a new name.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - template_name
                    - origin_template_id
                  properties:
                    template_name:
                      type: string
                      description: Name for the new (duplicate) template
                      example: "My Template - Copy"
                    origin_template_id:
                      type: integer
                      description: ID of the template to duplicate
                      example: 8974913
      responses:
        '200':
          description: >
            Object containing the new template ID as a string.
            Note: `template_id` is returned as a string, not an integer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateTemplateResponse'
              example:
                template_id: "9491649"
        '401':
          description: Unauthorized
        '404':
          description: Original template not found
        '429':
          description: Rate limit exceeded

  # ═══════════════════════════════════════════
  # SMTP
  # ═══════════════════════════════════════════

  /getCreditsSMTP/:
    post:
      tags: [SMTP]
      summary: Get remaining SMTP credits
      description: >
        Returns the number of remaining transactional email credits.
        Note: The response key is `Creditos` (with a capital C).
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthFields'
      responses:
        '200':
          description: Remaining SMTP credits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SMTPCreditsResponse'
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded

  /sendOne/:
    post:
      tags: [SMTP]
      summary: Send a single transactional email
      description: >
        Sends a single transactional email via SMTP. Requires SMTP to be active for
        the account. Returns an `email_key` string that can be used with `getEmailStatus`
        to track the message.

        Returns HTTP 401 with "SMTP is not active for your customer" if SMTP is not enabled.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - $ref: '#/components/schemas/SingleMessageRequest'
      responses:
        '201':
          description: Email key for tracking the sent message
          content:
            application/json:
              schema:
                type: string
                description: Unique email key for tracking
                example: "abc123emailkey"
        '401':
          description: Unauthorized or SMTP not active for this account
        '429':
          description: Rate limit exceeded

  /send/:
    post:
      tags: [SMTP]
      summary: Send multiple transactional emails
      description: >
        Sends multiple transactional emails in a single request. Each item in
        `messages` follows the same schema as `sendOne` (without auth fields).
        Requires SMTP to be active.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - messages
                  properties:
                    messages:
                      type: array
                      items:
                        $ref: '#/components/schemas/SingleMessageRequest'
      responses:
        '201':
          description: Array of results for each message
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          description: Unauthorized or SMTP not active
        '429':
          description: Rate limit exceeded

  /sendCertifiedEmail/:
    post:
      tags: [SMTP]
      summary: Send a certified transactional email
      description: >
        Sends a certified (legal-proof) transactional email. Same parameters as `sendOne`.
        Requires SMTP to be active. Returns an email_key for tracking.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - $ref: '#/components/schemas/SingleMessageRequest'
      responses:
        '201':
          description: Email key for tracking
          content:
            application/json:
              schema:
                type: string
                example: "cert123emailkey"
        '401':
          description: Unauthorized or SMTP not active
        '429':
          description: Rate limit exceeded

  /getEmailStatus/:
    post:
      tags: [SMTP]
      summary: Get the delivery status of a sent email
      description: >
        Returns the current delivery status and metadata for an email sent via
        `sendOne` or `sendCertifiedEmail`. Requires SMTP to be active.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - email_key
                  properties:
                    email_key:
                      type: string
                      description: Email tracking key returned by sendOne or sendCertifiedEmail
                      example: "abc123emailkey"
      responses:
        '200':
          description: Email delivery status and metadata
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized or SMTP not active
        '404':
          description: Email key not found
        '429':
          description: Rate limit exceeded

  # ═══════════════════════════════════════════
  # WEBHOOKS
  # ═══════════════════════════════════════════

  /getSMTPWebhook/:
    post:
      tags: [Webhooks]
      summary: Get SMTP webhook configuration
      description: Returns the current SMTP webhook configuration for the account.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthFields'
      responses:
        '200':
          description: SMTP webhook configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SMTPWebhookResponse'
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded

  /configSMTPWebhook/:
    post:
      tags: [Webhooks]
      summary: Configure SMTP webhook
      description: >
        Creates or updates the SMTP webhook configuration.
        At minimum, `callback_url` must be provided.
        All event flags (`delivered`, `hard_bounce`, etc.) default to 0 (disabled).
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - callback_url
                  properties:
                    callback_url:
                      type: string
                      format: uri
                      description: URL to receive SMTP webhook events
                      example: "https://example.com/webhook/smtp"
                    delivered:
                      type: integer
                      enum: [0, 1]
                      description: Notify on successful delivery
                    hard_bounce:
                      type: integer
                      enum: [0, 1]
                      description: Notify on hard bounce
                    soft_bounce:
                      type: integer
                      enum: [0, 1]
                      description: Notify on soft bounce
                    complain:
                      type: integer
                      enum: [0, 1]
                      description: Notify on spam complaint
                    opens:
                      type: integer
                      enum: [0, 1]
                      description: Notify on email open
                    click:
                      type: integer
                      enum: [0, 1]
                      description: Notify on link click
                    active:
                      type: integer
                      enum: [0, 1]
                      description: Enable/disable the webhook
      responses:
        '200':
          description: Webhook ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookIdResponse'
              example:
                id: 87492
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded

  /getListWebhook/:
    post:
      tags: [Webhooks]
      summary: Get list webhook configuration
      description: >
        Returns the webhook configuration for a specific list.
        Returns HTTP 404 if no webhook has been configured for the list.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
      responses:
        '200':
          description: List webhook configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListWebhookResponse'
        '401':
          description: Unauthorized
        '404':
          description: No webhook configured for this list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "You have not configured a webhook for this list"
        '429':
          description: Rate limit exceeded

  /configListWebhook/:
    post:
      tags: [Webhooks]
      summary: Configure list webhook
      description: >
        Creates or updates the webhook configuration for a specific list.
        Both `list_id` and `callback_url` are required.
        All event flags default to 0 (disabled).
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                    - callback_url
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
                    callback_url:
                      type: string
                      format: uri
                      description: URL to receive list webhook events
                      example: "https://example.com/webhook/list"
                    subscribes:
                      type: integer
                      enum: [0, 1]
                      description: Notify on new subscription
                    unsubscribes:
                      type: integer
                      enum: [0, 1]
                      description: Notify on unsubscribe
                    hard_bounce:
                      type: integer
                      enum: [0, 1]
                      description: Notify on hard bounce
                    soft_bounce:
                      type: integer
                      enum: [0, 1]
                      description: Notify on soft bounce
                    complain:
                      type: integer
                      enum: [0, 1]
                      description: Notify on spam complaint
                    opens:
                      type: integer
                      enum: [0, 1]
                      description: Notify on email open
                    click:
                      type: integer
                      enum: [0, 1]
                      description: Notify on link click
                    active:
                      type: integer
                      enum: [0, 1]
                      description: Enable/disable the webhook
      responses:
        '200':
          description: Webhook ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookIdResponse'
              example:
                id: 102650
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '404':
          description: List not found
        '429':
          description: Rate limit exceeded
