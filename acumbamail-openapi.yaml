openapi: 3.0.3

info:
  title: Acumbamail API
  version: "1.0"
  description: |
    REST API for Acumbamail email marketing platform.

    ## Authentication
    All endpoints require the `auth_token` field in the request body (JSON). There is no
    header-based authentication. Optionally, include `response_type: "json"` (default).

    ## Rate Limits
    10 requests per minute per endpoint. Exceeding this limit returns HTTP 429.

    ## HTTP Methods
    All endpoints use **POST** with `Content-Type: application/json`.

    ## Response Codes
    | Code | Meaning |
    |------|---------|
    | 200  | Successful query |
    | 201  | Data created/modified successfully |
    | 400  | Bad request (invalid argument) |
    | 401  | Unauthorized or SMTP not active |
    | 404  | Resource not found |
    | 429  | Rate limit exceeded |
    | 500  | Server error |

servers:
  - url: https://acumbamail.com/api/1
    description: Acumbamail production API

tags:
  - name: Lists
    description: Manage subscriber lists
  - name: Subscribers
    description: Manage individual and batch subscribers
  - name: Campaigns
    description: Create, send and analyze email campaigns
  - name: Templates
    description: Manage email templates
  - name: SMTP
    description: Transactional email sending via SMTP
  - name: Webhooks
    description: Configure and query webhooks for SMTP and lists

components:
  schemas:

    # ─────────────────────────────────────────
    # Shared base fields
    # ─────────────────────────────────────────
    AuthFields:
      type: object
      required:
        - auth_token
      properties:
        auth_token:
          type: string
          description: API authentication token
          example: "abc123xyz"
        response_type:
          type: string
          enum: [json]
          default: json
          description: Response format (always "json")

    # ─────────────────────────────────────────
    # Lists schemas
    # ─────────────────────────────────────────
    ListInfo:
      type: object
      properties:
        name:
          type: string
          example: "AliceBob - Seguidores"
        description:
          type: string
          example: ""

    GetListsResponse:
      type: object
      description: >
        Dictionary keyed by list_id (as string). Each value is a ListInfo object.
      additionalProperties:
        $ref: '#/components/schemas/ListInfo'
      example:
        "1138335":
          name: "AliceBob - Seguidores"
          description: ""

    ListStatsResponse:
      type: object
      properties:
        total_subscribers:
          type: integer
          example: 9
        unsubscribed_subscribers:
          type: integer
          example: 0
        hard_bounced_subscribers:
          type: integer
          example: 0
        spam_subscribers:
          type: integer
          example: 0
        name:
          type: string
          example: "pruebas"
          description: Name of the list
        create_date:
          type: string
          example: "2025/06/26 15:03:34"
          description: Date the list was created
      required:
        - total_subscribers
        - unsubscribed_subscribers
        - hard_bounced_subscribers

    ListFieldsResponse:
      type: object
      description: Dictionary mapping field_name to field_type
      additionalProperties:
        type: string
      example:
        email: "email"
        "-curso >curso_a,curso_b,curso_c": "combobox"

    # ─────────────────────────────────────────
    # Subscribers schemas
    # ─────────────────────────────────────────
    SubscriberInfo:
      type: object
      properties:
        status:
          type: string
          example: "active"
        id:
          type: integer
          format: int64
          example: 5678672566
        email:
          type: string
          format: email
          example: "user@example.com"

    GetSubscribersResponse:
      type: object
      description: Dictionary keyed by email address. Each value is a SubscriberInfo object.
      additionalProperties:
        $ref: '#/components/schemas/SubscriberInfo'
      example:
        "user@example.com":
          status: "active"
          id: 5678672566
          email: "user@example.com"

    SubscriberDetails:
      type: object
      properties:
        status:
          type: string
          example: "active"
        create_date:
          type: string
          description: Creation date in "YYYY/MM/DD HH:MM:SS" format
          example: "2025/06/30 07:32:30"
        email:
          type: string
          format: email
          example: "cr0hn@cr0hn.com"
        id:
          type: integer
          format: int64
          example: 5125884584
      additionalProperties:
        description: Additional custom merge field values

    GetSubscriberDetailsResponse:
      type: object
      description: Dictionary keyed by email address. Value is SubscriberDetails.
      additionalProperties:
        $ref: '#/components/schemas/SubscriberDetails'
      example:
        "cr0hn@cr0hn.com":
          status: "active"
          create_date: "2025/06/30 07:32:30"
          email: "cr0hn@cr0hn.com"
          id: 5125884584
          custom_field: ""

    SearchSubscriberResult:
      type: object
      properties:
        status:
          type: string
          example: "active"
        create_date:
          type: string
          example: "2025/06/30 07:32:30"
        email:
          type: string
          format: email
          example: "cr0hn@cr0hn.com"
        list_id:
          type: integer
          example: 1138335
        id:
          type: integer
          format: int64
          example: 5125884584

    InactiveSubscriberSimple:
      type: array
      description: Array with a single email address string
      items:
        type: string
      minItems: 1
      maxItems: 1
      example: ["user@example.com"]

    InactiveSubscriberFull:
      type: object
      properties:
        reason:
          type: integer
          description: Reason code for inactivity (e.g. 3 = hard bounce)
          example: 3
        reason_date:
          type: string
          description: Date of the inactivity event in "YYYY/MM/DD HH:MM:SS" format
          example: "2025/09/25 12:18:38"
        email:
          type: string
          format: email
          example: "daniel@abirtone.com"

    GetInactiveSubscribersSimpleResponse:
      type: object
      properties:
        inactive_subscribers:
          type: array
          items:
            $ref: '#/components/schemas/InactiveSubscriberSimple'
      example:
        inactive_subscribers:
          - ["email1@example.com"]
          - ["email2@example.com"]

    GetInactiveSubscribersFullResponse:
      type: object
      properties:
        inactive_subscribers:
          type: array
          items:
            $ref: '#/components/schemas/InactiveSubscriberFull'
      example:
        inactive_subscribers:
          - reason: 3
            reason_date: "2025/09/25 12:18:38"
            email: "daniel@abirtone.com"

    AddSubscriberFullResponse:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        id:
          type: integer
          format: int64
          example: 5678672566

    BatchSubscriberResult:
      type: object
      description: Dictionary mapping email to subscriber_id
      additionalProperties:
        type: integer
        format: int64
      example:
        "user@example.com": 5678672566

    # ─────────────────────────────────────────
    # Campaigns schemas
    # ─────────────────────────────────────────
    CampaignTotalInfo:
      type: object
      properties:
        total_delivered:
          type: integer
          example: 490
        soft_bounces:
          type: integer
          example: 2
        campaign_url:
          type: string
          format: uri
          example: "https://acumbamail.com/..."
        unsubscribes:
          type: integer
          example: 3
        complaints:
          type: integer
          example: 0
        unique_clicks:
          type: integer
          example: 45
        unopened:
          type: integer
          example: 370
        emails_to_send:
          type: integer
          example: 500
        opened:
          type: integer
          example: 120
        hard_bounces:
          type: integer
          example: 8
        total_clicks:
          type: integer
          example: 62

    CampaignClick:
      type: object
      properties:
        url:
          type: string
          format: uri
          example: "https://example.com"
        clicks:
          type: integer
          example: 100
        unique_clicks:
          type: integer
          example: 80
        click_rate:
          type: number
          format: float
          example: 0.15
        unique_click_rate:
          type: number
          format: float
          example: 0.12

    CampaignOpener:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        opened_at:
          type: string
          format: date-time
          example: "2024-03-20T10:30:00"
        ip:
          type: string
          example: "1.2.3.4"
        user_agent:
          type: string
          example: "Mozilla/5.0..."
        country:
          type: string
          example: "ES"
        browser:
          type: string
          example: "Chrome"
        os:
          type: string
          example: "Windows"
        device:
          type: string
          example: "desktop"

    CampaignSoftBounce:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        bounced_at:
          type: string
          format: date-time
          example: "2024-03-20T10:30:00"
        reason:
          type: string
          example: "Mailbox full"
        status:
          type: string
          example: "4.2.2"
        diagnostic_code:
          type: string
          example: "smtp; 452 4.2.2 Mailbox full"

    # ─────────────────────────────────────────
    # Templates schemas
    # ─────────────────────────────────────────
    TemplateInfo:
      type: object
      properties:
        available:
          type: boolean
          example: false
        id:
          type: integer
          example: 8974913
        name:
          type: string
          example: "Template_3294239_96"

    DuplicateTemplateResponse:
      type: object
      properties:
        template_id:
          type: string
          description: Template ID returned as a string (note - not an integer)
          example: "9491649"

    # ─────────────────────────────────────────
    # SMTP schemas
    # ─────────────────────────────────────────
    SMTPCreditsResponse:
      type: object
      properties:
        Creditos:
          type: integer
          description: Remaining SMTP credits. Note the capital "C" in the key name.
          example: 500000

    SingleMessageRequest:
      type: object
      required:
        - from_email
        - to_email
        - subject
        - body
      properties:
        from_email:
          type: string
          format: email
          example: "sender@example.com"
        from_name:
          type: string
          example: "Sender Name"
        to_email:
          type: string
          format: email
          example: "recipient@example.com"
        subject:
          type: string
          example: "Hello!"
        body:
          type: string
          description: HTML body of the email
          example: "<p>Hello!</p>"
        cc_email:
          type: string
          format: email
        bcc_email:
          type: string
          format: email
        template_id:
          type: integer
          example: 8974913
        merge_tags:
          type: object
          additionalProperties:
            type: string
          example:
            FNAME: "John"
            LNAME: "Doe"
        category:
          type: string
          example: "transactional"
        program_date:
          type: string
          description: Scheduled send date in "YYYY-MM-DD HH:MM" format
          example: "2024-03-20 10:30"

    # ─────────────────────────────────────────
    # Webhook schemas
    # ─────────────────────────────────────────
    SMTPWebhookInfo:
      type: object
      properties:
        url:
          type: string
          format: uri
          example: "https://example.com/webhook"
        soft_bounces:
          type: boolean
          example: false
        complaints:
          type: boolean
          example: false
        delivered:
          type: boolean
          example: true
        active:
          type: boolean
          example: false
        hard_bounces:
          type: boolean
          example: true
        id:
          type: integer
          example: 87492
        opens:
          type: boolean
          example: false
        clicks:
          type: boolean
          example: false

    SMTPWebhookResponse:
      type: object
      properties:
        info:
          $ref: '#/components/schemas/SMTPWebhookInfo'

    ListWebhookInfo:
      type: object
      properties:
        url:
          type: string
          format: uri
          example: "https://example.com/webhook"
        soft_bounces:
          type: boolean
          example: false
        complaints:
          type: boolean
          example: false
        unsubscribes:
          type: boolean
          example: true
        subscribes:
          type: boolean
          example: true
        active:
          type: boolean
          example: false
        hard_bounces:
          type: boolean
          example: false
        id:
          type: integer
          example: 102650
        opens:
          type: boolean
          example: false
        clicks:
          type: boolean
          example: false

    ListWebhookResponse:
      type: object
      properties:
        info:
          $ref: '#/components/schemas/ListWebhookInfo'

    WebhookIdResponse:
      type: object
      properties:
        id:
          type: integer
          example: 87492

    # ─────────────────────────────────────────
    # Error schemas
    # ─────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Subscriber does not exist"

paths:

  # ═══════════════════════════════════════════
  # LISTS
  # ═══════════════════════════════════════════

  /getLists/:
    post:
      tags: [Lists]
      summary: Get all lists
      description: Returns all subscriber lists for the authenticated account.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthFields'
      responses:
        '200':
          description: Dictionary of lists keyed by list_id (string)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetListsResponse'
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded

  /createList/:
    post:
      tags: [Lists]
      summary: Create a new list
      description: Creates a new subscriber list.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - sender_email
                    - name
                  properties:
                    sender_email:
                      type: string
                      format: email
                      example: "sender@example.com"
                    name:
                      type: string
                      example: "My New List"
                    company:
                      type: string
                      example: "ACME Corp"
                    country:
                      type: string
                      example: "ES"
                    city:
                      type: string
                      example: "Madrid"
                    address:
                      type: string
                      example: "Calle Mayor 1"
                    phone:
                      type: string
                      example: "+34 600 000 000"
                    description:
                      type: string
                      example: "Subscribers newsletter"
      responses:
        '201':
          description: ID of the newly created list
          content:
            application/json:
              schema:
                type: integer
                example: 1138335
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded

  /deleteList/:
    post:
      tags: [Lists]
      summary: Delete a list
      description: Permanently deletes a subscriber list and all its subscribers.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
      responses:
        '201':
          description: List deleted successfully (empty object)
          content:
            application/json:
              schema:
                type: object
        '404':
          description: List does not exist
          content:
            application/json:
              schema:
                type: string
                example: "List does not exists"
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded

  /getListStats/:
    post:
      tags: [Lists]
      summary: Get list statistics
      description: Returns subscriber and campaign statistics for a specific list.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
      responses:
        '200':
          description: List statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListStatsResponse'
        '401':
          description: Unauthorized
        '404':
          description: List not found
        '429':
          description: Rate limit exceeded

  /getListFields/:
    post:
      tags: [Lists]
      summary: Get fields for a list
      description: Returns all field names and their types configured for a specific list.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
      responses:
        '200':
          description: Dictionary mapping field_name to field_type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFieldsResponse'
        '401':
          description: Unauthorized
        '404':
          description: List not found
        '429':
          description: Rate limit exceeded

  /getFields/:
    post:
      tags: [Lists]
      summary: Get all fields (including merge/combobox fields)
      description: >
        Returns all fields for a list including merge fields and combobox definitions.
        Combobox fields use a special syntax: `-fieldname >option1,option2,option3`.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
      responses:
        '200':
          description: Dictionary mapping field_name/definition to field_type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFieldsResponse'
              example:
                email: "email"
                "-curso >curso_a,curso_b,curso_c": "combobox"
        '401':
          description: Unauthorized
        '404':
          description: List not found
        '429':
          description: Rate limit exceeded

  /getForms/:
    post:
      tags: [Lists]
      summary: Get forms for a list
      description: Returns all subscription forms configured for a list. Returns empty object if no forms exist.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
      responses:
        '200':
          description: Dictionary of forms or empty object
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '404':
          description: List not found
        '429':
          description: Rate limit exceeded

  /getListSegments/:
    post:
      tags: [Lists]
      summary: Get segments for a list
      description: Returns all segments defined for a specific list.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
      responses:
        '200':
          description: List of segments
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          description: Unauthorized
        '404':
          description: List not found
        '429':
          description: Rate limit exceeded

  /getListSubsStats/:
    post:
      tags: [Lists]
      summary: Get subscriber statistics for a list (paginated)
      description: >
        Returns per-subscriber statistics for a list. Supports pagination via `block_index`
        (each block returns up to 1000 subscribers, default block is 0).
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
                    block_index:
                      type: integer
                      default: 0
                      description: Page index for pagination (0-based)
                      example: 0
      responses:
        '200':
          description: Dictionary with stats per subscriber
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '404':
          description: List not found
        '429':
          description: Rate limit exceeded

  /getMergeFields/:
    post:
      tags: [Lists]
      summary: Get merge fields for a list
      description: Returns all merge fields (personalization tags) configured for a list.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
      responses:
        '200':
          description: Dictionary of merge fields
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        '401':
          description: Unauthorized
        '404':
          description: List not found
        '429':
          description: Rate limit exceeded

  /addMergeTag/:
    post:
      tags: [Lists]
      summary: Add a merge tag (custom field) to a list
      description: >
        Adds a new custom field to an existing list. Supported field types:
        `text`, `combobox`, `date`, `number`.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                    - field_name
                    - field_type
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
                    field_name:
                      type: string
                      example: "firstname"
                    field_type:
                      type: string
                      enum: [text, combobox, date, number]
                      example: "text"
      responses:
        '201':
          description: Merge tag created successfully
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid field type or name
        '401':
          description: Unauthorized
        '404':
          description: List not found
        '429':
          description: Rate limit exceeded

  # ═══════════════════════════════════════════
  # SUBSCRIBERS
  # ═══════════════════════════════════════════

  /getSubscribers/:
    post:
      tags: [Subscribers]
      summary: Get subscribers for a list
      description: >
        Returns subscribers for a given list. Supports pagination via `block_index`.
        Use `all_fields=1` to include custom merge fields in the response.
        Use `complete_json=1` for full subscriber objects.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
                    block_index:
                      type: integer
                      default: 0
                      description: Pagination block index (0-based, ~1000 subscribers per block)
                      example: 0
                    all_fields:
                      type: integer
                      enum: [0, 1]
                      default: 0
                      description: Set to 1 to include all custom merge fields
                    complete_json:
                      type: integer
                      enum: [0, 1]
                      default: 0
                      description: Set to 1 for full subscriber objects
      responses:
        '200':
          description: Dictionary of subscribers keyed by email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSubscribersResponse'
        '401':
          description: Unauthorized
        '404':
          description: List not found
        '429':
          description: Rate limit exceeded

  /addSubscriber/:
    post:
      tags: [Subscribers]
      summary: Add a subscriber to a list
      description: >
        Adds a single subscriber to a list. The `merge_fields` object must contain
        at minimum the `email` key. Use `double_optin=1` to trigger a confirmation email.
        Use `complete_json=1` to get the full subscriber object in the response instead
        of just the subscriber ID.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                    - merge_fields
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
                    merge_fields:
                      type: object
                      required:
                        - email
                      properties:
                        email:
                          type: string
                          format: email
                          example: "user@example.com"
                      additionalProperties:
                        type: string
                      description: Merge field values. Must include "email".
                    double_optin:
                      type: integer
                      enum: [0, 1]
                      default: 0
                      description: Send double opt-in confirmation email
                    update_subscriber:
                      type: integer
                      enum: [0, 1]
                      default: 0
                      description: Update existing subscriber if already subscribed
                    complete_json:
                      type: integer
                      enum: [0, 1]
                      default: 0
                      description: Return full subscriber object instead of just ID
      responses:
        '201':
          description: >
            If complete_json=0: integer subscriber ID.
            If complete_json=1: full subscriber object with email and id.
          content:
            application/json:
              schema:
                oneOf:
                  - type: integer
                    format: int64
                    example: 5678672566
                  - $ref: '#/components/schemas/AddSubscriberFullResponse'
        '400':
          description: Invalid request (e.g. missing email)
        '401':
          description: Unauthorized
        '404':
          description: List not found
        '429':
          description: Rate limit exceeded

  /deleteSubscriber/:
    post:
      tags: [Subscribers]
      summary: Delete a subscriber from a list
      description: Permanently removes a subscriber from a list.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                    - email
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
                    email:
                      type: string
                      format: email
                      example: "user@example.com"
      responses:
        '201':
          description: Subscriber deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    format: email
                    example: "user@example.com"
        '401':
          description: Unauthorized
        '404':
          description: Subscriber or list not found
        '429':
          description: Rate limit exceeded

  /batchAddSubscribers/:
    post:
      tags: [Subscribers]
      summary: Batch add subscribers to a list
      description: >
        Adds multiple subscribers to a list in a single request. Each item in
        `subscribers_data` must contain at least an `email` key.
        Use `update_subscriber=1` to update existing subscribers.
        Returns an array of `{email: subscriber_id}` objects.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                    - subscribers_data
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
                    subscribers_data:
                      type: array
                      description: Array of subscriber objects; each must have an "email" key
                      items:
                        type: object
                        required:
                          - email
                        properties:
                          email:
                            type: string
                            format: email
                            example: "user@example.com"
                        additionalProperties:
                          type: string
                    update_subscriber:
                      type: integer
                      enum: [0, 1]
                      default: 0
                      description: Update existing subscribers instead of skipping them
                    complete_json:
                      type: integer
                      enum: [0, 1]
                      default: 0
      responses:
        '201':
          description: "Array of {email: subscriber_id} mappings"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BatchSubscriberResult'
              example:
                - "user@example.com": 5678672566
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '404':
          description: List not found
        '429':
          description: Rate limit exceeded

  /batchDeleteSubscribers/:
    post:
      tags: [Subscribers]
      summary: Batch delete subscribers from a list
      description: >
        Deletes multiple subscribers from a list by email address.

        **Known Bug**: This endpoint consistently returns HTTP 500 due to a server-side bug.
        Use `deleteSubscriber` in a loop as a workaround.
      x-rate-limit: "10 requests/minute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthFields'
                - type: object
                  required:
                    - list_id
                    - email_list
                  properties:
                    list_id:
                      type: integer
                      example: 1138335
                    email_list:
                      type: array
                      items:
                        type: string
                        format: email
                      example: ["user1@example.com", "user2@example.com"]
      responses:
        '500':
          description: >
            Server error — this endpoint has a known bug and always returns 500.
            Use deleteSubscriber in a loop as a workaround.

  /deleteAllSubscribers/:
    post:
      tags: [Subscribers]
      summary: Delete all subscribers from a list
      description: >
